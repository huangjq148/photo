services:
  postgres-test:
    image: postgres:16-alpine
    container_name: photo-test-db
    ports:
      - "6000:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: photo_management_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d photo_management_test"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
    tmpfs:
      - /var/lib/postgresql/data
