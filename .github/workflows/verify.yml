name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: photo_management_test
        ports:
          - 6000:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:6000/photo_management_test?schema=public
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Verify
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:6000/photo_management_test?schema=public
          JWT_SECRET: test-secret-for-ci-verification-only
          STORAGE_ROOT: /tmp/storage-e2e
        run: npm run verify

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
